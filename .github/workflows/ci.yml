name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum
      - name: Verify modules
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum
      - uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m
      - name: Check formatting
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -l . && exit 1)

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - run: go generate ./...
      - run: go test -race -tags=unit -coverprofile=coverage.out -coverpkg=./internal/...,./pkg/... -covermode=atomic ./internal/... ./pkg/...
      - name: Coverage gate (60%)
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $total%"
          awk -v t="$total" 'BEGIN { exit !(t < 60.0) }' && { echo "Coverage below 60%"; exit 1; } || true

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s --health-timeout 5s --health-retries 10
      valkey:
        image: valkey/valkey:9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL_MODE: disable
      VALKEY_HOST: localhost
      VALKEY_PORT: 6379
      VALKEY_DB: "0"
      APP_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: Verify sqlc generate is in sync
        run: |
          go tool sqlc generate
          git diff --exit-code internal/infrastructure/db/sqlc
      - run: go run ./cmd/migrate up
      - run: go test -race -tags=integration ./...

  backend-build:
    name: Backend Build + Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-lint, backend-unit]
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum
      - name: Build binaries
        working-directory: backend
        run: |
          go build -ldflags="-s -w" -o bin/server ./cmd/server
          go build -ldflags="-s -w" -o bin/migrate ./cmd/migrate
      - name: Build server image (SPA embedded)
        run: docker build -f Containerfile -t go-angular-spa-template:ci .
      - name: Scan built image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: go-angular-spa-template:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.8
      - run: bun install --frozen-lockfile
      - name: Audit production dependencies (bun audit)
        # Audit only runtime deps that ship in the embedded bundle. Build-time
        # devDependencies (vite/esbuild via @angular/build, vitest) carry
        # advisories that can't be resolved until Angular bumps them and never
        # reach the browser, so gating on them would wedge CI.
        run: bun audit --production
      - run: bunx ng lint
      - run: bunx ng test --watch=false
      - run: bun run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum
      - name: govulncheck (backend)
        uses: golang/govulncheck-action@v1.0.4
        with:
          go-version-input: "1.26.x"
          work-dir: backend
      - name: Trivy filesystem scan (repo)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig

  openapi:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5.0.1
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.8
      - name: Lint OpenAPI spec (Spectral)
        run: bunx @stoplight/spectral-cli@6.15.0 lint backend/api/openapi.yaml --ruleset .spectral.yaml --fail-severity=warn
