name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Verify sqlc generate is in sync
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          sqlc generate
          git diff --exit-code backend/internal/repository/postgres/gen

      - name: Build
        run: go build ./backend/...

      - name: Test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app?sslmode=disable
        run: go test ./backend/...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: ./backend/...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - run: bun install --frozen-lockfile
      - run: bunx ng lint
      - run: bunx ng test --watch=false
      - run: bun run build
