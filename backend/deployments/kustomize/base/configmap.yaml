apiVersion: v1
kind: ConfigMap
metadata:
  name: go-angular-spa-template-config
data:
  APP_NAME: "go-angular-spa-template"
  APP_ENVIRONMENT: "production"
  HTTP_HOST: "0.0.0.0"
  HTTP_PORT: "8080"
  GRPC_HOST: "0.0.0.0"
  GRPC_PORT: "50051"
  DB_SSL_MODE: "prefer"
  DB_MAX_CONNS: "10"
  VALKEY_PORT: "6379"
  LOG_LEVEL: "info"
  OTEL_EXPORTER: "none"
  OTEL_SERVICE_NAME: "go-angular-spa-template"
  OTEL_TRACES_SAMPLER_ARG: "1.0"
