apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-angular-spa-template
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: go-angular-spa-template
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-angular-spa-template
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: go-angular-spa-template:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: go-angular-spa-template-config
            - secretRef:
                name: go-angular-spa-template-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
