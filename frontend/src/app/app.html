<mat-toolbar color="primary">
  <span>{{ title }}</span>
  <span class="toolbar-spacer"></span>
  <a class="toolbar-link" href="/api/docs">API docs</a>
  <button
    mat-icon-button
    [matMenuTriggerFor]="themeMenu"
    aria-label="Switch theme"
    matTooltip="Switch theme"
  >
    <mat-icon>{{ theme.icon() }}</mat-icon>
  </button>
  <mat-menu #themeMenu="matMenu">
    <button mat-menu-item (click)="theme.set('light')" [class.active]="theme.mode() === 'light'">
      <mat-icon>light_mode</mat-icon>
      <span>Light</span>
    </button>
    <button mat-menu-item (click)="theme.set('dark')" [class.active]="theme.mode() === 'dark'">
      <mat-icon>dark_mode</mat-icon>
      <span>Dark</span>
    </button>
    <button mat-menu-item (click)="theme.set('system')" [class.active]="theme.mode() === 'system'">
      <mat-icon>brightness_auto</mat-icon>
      <span>System</span>
    </button>
  </mat-menu>
</mat-toolbar>

<main class="container">
  <router-outlet />
</main>
