root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./backend/cmd/server"
  bin = "./tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "frontend", "node_modules", "backend/web/dist"]
  exclude_regex = ["_test\\.go", ".*\\.sql\\.go"]
  delay = 1000
  stop_on_error = true

[misc]
  clean_on_exit = true
