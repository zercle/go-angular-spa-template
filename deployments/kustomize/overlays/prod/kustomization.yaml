apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: go-angular-spa-template-prod

resources:
  - ../../base

# Pin a real, immutable image tag in your release pipeline.
images:
  - name: go-angular-spa-template
    newTag: latest

replicas:
  - name: server
    count: 3

patches:
  # Example: set the public host on the Ingress. Adjust to your domain and add
  # TLS (e.g. cert-manager annotations + spec.tls) for production.
  - target:
      kind: Ingress
      name: server
    patch: |-
      - op: add
        path: /spec/rules/0/host
        value: app.example.com
