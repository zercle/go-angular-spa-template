version: "2"
sql:
  - engine: "postgresql"
    schema: "backend/internal/repository/postgres/migrations"
    queries: "backend/internal/repository/postgres/queries"
    gen:
      go:
        package: "gen"
        out: "backend/internal/repository/postgres/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
